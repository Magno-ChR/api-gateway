services:
  api-gateway:
    image: geonmagno/api_gateway:0.1.3
    container_name: api-gateway-dp
    environment:
      - ASPNETCORE_URLS=http://+:5000
      # Backends: usar host.docker.internal cuando solo este gateway corre en Docker y el resto en el host.
      # Si corres el stack completo (mismo compose con api-security, api-patient, etc.), cambia a nombres de servicio (api-security:5000, api-patient:5003, etc.).
      - ReverseProxy__Clusters__security-api__Destinations__security-backend__Address=http://host.docker.internal:5001
      - ReverseProxy__Clusters__patients-api__Destinations__patients-backend__Address=http://host.docker.internal:5002
      - ReverseProxy__Clusters__kitchen-api__Destinations__kitchen-backend__Address=http://host.docker.internal:5031
      - ReverseProxy__Clusters__logistic-api__Destinations__logistic-backend__Address=http://host.docker.internal:5041
      - ReverseProxy__Clusters__plans-api__Destinations__plans-backend__Address=http://host.docker.internal:5005
      - ReverseProxy__Clusters__calendar-api__Destinations__calendar-backend__Address=http://host.docker.internal:7020
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - shared-network

