services:
  api-gateway:
    image: geonmagno/api_gateway:0.1.3
    container_name: api-gateway-dp
    environment:
      - ASPNETCORE_URLS=http://+:5001
      # Direcciones de los backends del reverse proxy (modificables aquí)
      - ReverseProxy__Clusters__security-api__Destinations__security-backend__Address=http://api-security:5000
      - ReverseProxy__Clusters__patients-api__Destinations__patients-backend__Address=https://host.docker.internal:5002
      - ReverseProxy__Clusters__kitchen-api__Destinations__kitchen-backend__Address=http://kitchen-api:5005
      - ReverseProxy__Clusters__logistic-api__Destinations__logistic-backend__Address=http://logistic-api:5006
      - ReverseProxy__Clusters__plans-api__Destinations__plans-backend__Address=http://plans-api:5007
      - ReverseProxy__Clusters__calendar-api__Destinations__calendar-backend__Address=http://calendario-webapi:7020
    ports:
      - "5001:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data:
